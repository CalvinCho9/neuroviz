<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroViz Pro — Anatomical EEG Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#060b11; --bg2:#0c1620; --bg3:#101e2e;
    --accent:#00d4ff; --accent2:#ff6b35; --accent3:#7fff7f;
    --text:#e4f0f5; --text2:#6e8fa5;
    --border:rgba(0,200,255,0.12); --panel:rgba(10,20,30,0.96);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow:hidden;height:100vh;width:100vw;}

  #canvas-container{position:absolute;inset:0;}
  #main-canvas{width:100%;height:100%;display:block;}

  #topbar{
    position:absolute;top:0;left:0;right:0;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 24px;
    background:linear-gradient(to bottom,rgba(6,11,17,0.97),transparent);
    pointer-events:none;z-index:10;
  }
  .logo{font-size:20px;font-weight:600;letter-spacing:-0.5px;}
  .logo span{color:var(--accent);}
  .logo-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);margin-top:3px;}

  /* LEFT PANEL: SIMPLIFIED */
  #left-panel{
    position:absolute;left:0;top:60px;bottom:0;width:300px;
    background:var(--panel);border-right:1px solid var(--border);
    display:flex;flex-direction:column;z-index:10;overflow:hidden;
  }
  .panel-section{padding:14px 16px;border-bottom:1px solid var(--border);}
  .panel-section.scrollable{overflow-y:auto;flex:1;}
  .panel-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}

  .rec-card{
    padding:12px;margin-bottom:8px;
    border:1px solid var(--border);border-radius:8px;
    cursor:pointer;transition:all 0.2s;background:rgba(0,0,0,0.3);
  }
  .rec-card:hover{border-color:var(--accent);background:rgba(0,212,255,0.05);}
  .rec-card.active{border-color:var(--accent);background:rgba(0,212,255,0.12);box-shadow: 0 0 15px rgba(0,212,255,0.1);}
  .rec-label{font-size:13px;font-weight:600;color:var(--text);}
  .rec-task{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.4;}
  .rec-look{font-size:10px;color:var(--accent);margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,212,255,0.1);}

  #playback{padding:16px;background:rgba(0,0,0,0.2);}
  .time-display{font-family:'JetBrains Mono',monospace;font-size:24px;color:var(--accent);margin-bottom:12px;}
  .playback-controls{display:flex;align-items:center;justify-content:space-between;}
  .btn{padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text);font-size:12px;cursor:pointer;}
  .btn.primary{background:var(--accent);color:#000;font-weight:600;}
  .speed-badge{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);}

  /* RIGHT PANEL: STABLE */
  #right-panel{
    position:absolute;right:0;top:60px;width:260px;bottom:0;
    background:var(--panel);border-left:1px solid var(--border);
    z-index:10;display:flex;flex-direction:column;
  }
  .filter-chips{display:flex;flex-wrap:wrap;gap:4px;padding:12px;border-bottom:1px solid var(--border);}
  .filter-chip{
    padding:4px 10px;border:1px solid var(--border);border-radius:12px;
    font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text2);cursor:pointer;
  }
  .filter-chip.active{background:var(--accent);color:#000;border-color:var(--accent);}

  #active-regions{padding:12px;flex:1;overflow-y:auto;}
  .region-item{margin-bottom:12px;transition:all 0.3s;}
  .region-item.hidden{display:none;}
  .region-name{font-size:11px;font-weight:500;margin-bottom:4px;display:block;}
  .region-bar-wrap{height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;}
  .region-bar{height:100%;background:var(--accent);width:0%;transition:width 0.4s;}
  
  #note-box{padding:15px;background:var(--bg3);border-top:1px solid var(--border);}
  #note-title{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;margin-bottom:6px;}
  #note-text{font-size:11px;color:var(--text2);line-height:1.5;}

  #view-toggles{position:absolute;top:70px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;}
  .view-btn{padding:6px 12px;background:var(--panel);border:1px solid var(--border);color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:10px;border-radius:4px;cursor:pointer;}
  .view-btn.active{color:var(--accent);border-color:var(--accent);}

  #legend{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:20px;background:var(--panel);padding:10px 20px;border-radius:8px;border:1px solid var(--border);}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--text2);}
  .legend-color{width:12px;height:12px;border-radius:2px;}

  #tip{position:absolute;background:var(--panel);border:1px solid var(--accent);border-radius:4px;padding:8px;display:none;z-index:100;pointer-events:none;}
  
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div id="canvas-container"><canvas id="main-canvas"></canvas></div>

<div id="topbar">
  <div>
    <div class="logo"><span>Neuro</span>Viz Pro</div>
    <div class="logo-sub">Anatomical EEG MMIDB Analysis · 0.25x Slow-Motion</div>
  </div>
</div>

<div id="view-toggles">
  <button class="view-btn active" onclick="setView('lateral',event)">LATERAL</button>
  <button class="view-btn" onclick="setView('top',event)">SUPERIOR</button>
  <button class="view-btn" onclick="setView('front',event)">FRONTAL</button>
</div>

<div id="left-panel">
  <div class="panel-section scrollable">
    <div class="panel-label">EEG Sessions</div>
    <div id="rec-list"></div>
  </div>
  <div id="playback">
    <div class="time-display" id="time-display">0.00s</div>
    <div class="playback-controls">
      <button class="btn primary" id="play-btn" onclick="togglePlay()">▶ PLAY</button>
      <span class="speed-badge">SPEED: 0.25×</span>
    </div>
  </div>
</div>

<div id="right-panel">
  <div class="filter-chips" id="filter-chips">
    <div class="filter-chip active" onclick="setFilter('All',event)">All</div>
    <div class="filter-chip" onclick="setFilter('Frontal',event)">Frontal</div>
    <div class="filter-chip" onclick="setFilter('Motor',event)">Motor</div>
    <div class="filter-chip" onclick="setFilter('Visual',event)">Visual</div>
  </div>
  <div id="active-regions"></div>
  <div id="note-box">
    <div id="note-title">Anatomical Guide</div>
    <div id="note-text">Select a session to begin real-time neural mapping.</div>
  </div>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-color" style="background:#0055bb"></div> Low Alpha</div>
  <div class="legend-item"><div class="legend-color" style="background:#ffd700"></div> Beta Active</div>
  <div class="legend-item"><div class="legend-color" style="background:#ff3300"></div> High Gamma</div>
</div>

<div id="tip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// --- DATA & CONFIG ---
const ELECTRODES = [
  {id:'Fp1', pos:[-0.31, 0.92, 0.24], region:'Prefrontal L', group:'Frontal'},
  {id:'Fp2', pos:[ 0.31, 0.92, 0.24], region:'Prefrontal R', group:'Frontal'},
  {id:'F3',  pos:[-0.50, 0.72, 0.46], region:'Middle Frontal L', group:'Frontal'},
  {id:'F4',  pos:[ 0.50, 0.72, 0.46], region:'Middle Frontal R', group:'Frontal'},
  {id:'C3',  pos:[-0.72, 0.00, 0.70], region:'Motor Cortex L', group:'Motor'},
  {id:'C4',  pos:[ 0.72, 0.00, 0.70], region:'Motor Cortex R', group:'Motor'},
  {id:'P3',  pos:[-0.50,-0.72, 0.46], region:'Parietal L', group:'Parietal'},
  {id:'P4',  pos:[ 0.50,-0.72, 0.46], region:'Parietal R', group:'Parietal'},
  {id:'O1',  pos:[-0.31,-0.92, 0.20], region:'Visual Cortex L', group:'Visual'},
  {id:'O2',  pos:[ 0.31,-0.92, 0.20], region:'Visual Cortex R', group:'Visual'},
  {id:'T7',  pos:[-1.00, 0.00, 0.00], region:'Temporal L', group:'Temporal'},
  {id:'T8',  pos:[ 1.00, 0.00, 0.00], region:'Temporal R', group:'Temporal'}
];

const SCENARIOS = [
  { label: "Resting: Eyes Closed", task: "Relaxed state with no visual input.", look: "Strong synchronized pulses in the Visual Cortex (O1, O2).", note: "Alpha rhythm (8-13Hz) emerges in posterior regions during visual rest." },
  { label: "Imagine: Left Hand", task: "Squeezing a hypothetical left fist.", look: "Activation shift to the RIGHT Motor Cortex (C4 area).", note: "The brain is cross-wired: right hemisphere controls the left side of the body." },
  { label: "Imagine: Right Hand", task: "Squeezing a hypothetical right fist.", look: "Activation shift to the LEFT Motor Cortex (C3 area).", note: "Mu-rhythm desynchronization occurs over the motor strip during imagery." },
  { label: "Mental Calculation", task: "Solving arithmetic (e.g., 17 x 24).", look: "High frequency activity in Prefrontal and Parietal regions.", note: "Beta and Gamma waves dominate during executive cognitive load." }
];

const ALL_REGIONS = [...new Set(ELECTRODES.map(e => e.region))].sort();

// --- THREE.JS SETUP ---
const canvas = document.getElementById('main-canvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setClearColor(0x060b11, 1);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 4);

function buildAnatomicalBrain() {
  const brainGroup = new THREE.Group();
  
  // Cerebrum: Improved Anatomical Shape
  const geo = new THREE.SphereGeometry(1, 64, 64);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    let x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    const r = Math.sqrt(x*x + y*y + z*z);
    
    // Frontal Lobe bulge & Occipital taper
    const frontal = 0.15 * Math.exp(-Math.pow(z + 0.8, 2) / 0.2);
    const temporal = 0.08 * Math.exp(-Math.pow(y + 0.4, 2) / 0.1) * (Math.abs(x) > 0.5 ? 1 : 0);
    const fissure = Math.abs(x) < 0.06 ? -0.05 : 0; // The midline split
    
    const deform = frontal + temporal + fissure;
    pos.setXYZ(i, x * 1.1 + (x/r)*deform, y * 0.85 + (y/r)*deform, z * 0.95 + (z/r)*deform);
  }
  geo.computeVertexNormals();
  const mat = new THREE.MeshPhongMaterial({color: 0x1a2b3c, transparent: true, opacity: 0.8, shininess: 30});
  const cerebrum = new THREE.Mesh(geo, mat);
  brainGroup.add(cerebrum);

  // Add Sulci Lines (The "Wrinkles")
  const sulcusMat = new THREE.LineBasicMaterial({color: 0x000000, opacity: 0.3, transparent: true});
  const fissureLine = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0.8, -0.9), new THREE.Vector3(0, 0.8, 0.9)]);
  brainGroup.add(new THREE.Line(fissureLine, sulcusMat));

  return brainGroup;
}

const brain = buildAnatomicalBrain();
scene.add(brain);
scene.add(new THREE.AmbientLight(0x445566, 0.8));
const light = new THREE.PointLight(0x00d4ff, 1);
light.position.set(5, 5, 5);
scene.add(light);

// --- ELECTRODES ---
const eMeshes = ELECTRODES.map(el => {
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.04, 16, 16), new THREE.MeshPhongMaterial({color: 0xffffff, emissive: 0x004466}));
  mesh.position.set(el.pos[0] * 1.1, el.pos[2] * 0.85, -el.pos[1] * 0.95);
  brain.add(mesh);
  return mesh;
});

// --- UI LOGIC ---
let playing = false;
let playTime = 0;
let currentRecIdx = 0;

function buildUI() {
  const list = document.getElementById('rec-list');
  SCENARIOS.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = `rec-card ${i === 0 ? 'active' : ''}`;
    card.innerHTML = `
      <div class="rec-label">${s.label}</div>
      <div class="rec-task">${s.task}</div>
      <div class="rec-look"><b>WATCH:</b> ${s.look}</div>
    `;
    card.onclick = () => {
      document.querySelectorAll('.rec-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      currentRecIdx = i;
      playTime = 0;
      document.getElementById('note-text').innerText = s.note;
    };
    list.appendChild(card);
  });

  const regionsDiv = document.getElementById('active-regions');
  ALL_REGIONS.forEach(reg => {
    const item = document.createElement('div');
    item.className = 'region-item';
    item.dataset.group = ELECTRODES.find(e => e.region === reg).group;
    item.id = `reg-${reg.replace(/\s/g, '')}`;
    item.innerHTML = `
      <span class="region-name">${reg}</span>
      <div class="region-bar-wrap"><div class="region-bar" id="bar-${reg.replace(/\s/g, '')}"></div></div>
    `;
    regionsDiv.appendChild(item);
  });
}

function setFilter(group, e) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  document.querySelectorAll('.region-item').forEach(item => {
    item.classList.toggle('hidden', group !== 'All' && item.dataset.group !== group);
  });
}

function togglePlay() {
  playing = !playing;
  document.getElementById('play-btn').innerText = playing ? "⏸ PAUSE" : "▶ PLAY";
}

function animate() {
  requestAnimationFrame(animate);
  if (playing) {
    playTime += 0.005; // 0.25x effective speed
    if (playTime > 10) playTime = 0;
    document.getElementById('time-display').innerText = playTime.toFixed(2) + "s";
    
    // Update Electrodes & Bars
    ELECTRODES.forEach((el, i) => {
      const scenario = SCENARIOS[currentRecIdx];
      let act = 0.1 + Math.random() * 0.3;
      
      // Scenario-specific logic
      if (currentRecIdx === 1 && el.id === 'C4') act = 0.8; // Right Motor
      if (currentRecIdx === 2 && el.id === 'C3') act = 0.8; // Left Motor
      if (currentRecIdx === 0 && el.group === 'Visual') act = 0.7 + Math.sin(playTime * 5) * 0.2;

      const col = new THREE.Color().setHSL(0.5 + act * 0.5, 1, 0.5);
      eMeshes[i].material.color.copy(col);
      eMeshes[i].material.emissive.copy(col).multiplyScalar(0.5);
      eMeshes[i].scale.setScalar(0.8 + act * 1.5);
      
      const bar = document.getElementById(`bar-${el.region.replace(/\s/g, '')}`);
      if (bar) bar.style.width = (act * 100) + "%";
    });
  }
  
  brain.rotation.y += 0.002;
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

buildUI();
animate();

</script>
</body>
</html>
